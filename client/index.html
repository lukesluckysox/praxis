<!DOCTYPE html>
<html lang="en" style="background-color:#0c0e15">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0c0e15" />
    <title>Praxis — Laboratory of the Self</title>
    <meta name="description" content="Praxis transforms personal insight into lived experimentation. Design hypotheses, run trials, and extract principles from lived evidence." />
    <meta property="og:title" content="Praxis — Laboratory of the Self" />
    <meta property="og:description" content="A personal behavioral laboratory for testing beliefs, forming doctrines, and mapping the tensions that shape your life." />
    <style>html,body{background:#0c0e15;margin:0}</style>
  </head>
  <body style="background-color:#0c0e15">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  
<!-- Lumen loading screen — fixed overlay, hides when React mounts -->
<div id="lumen-splash" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#0c0e15;display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s ease">
  <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="46" stroke="#d4a03a" stroke-width="2" stroke-dasharray="0 0 145 145" stroke-linecap="round" opacity="0.5"/>
    <circle cx="50" cy="50" r="46" stroke="#d4a03a" stroke-width="2" stroke-dasharray="6 10" stroke-linecap="round" opacity="0.25" transform="rotate(180 50 50)"/>
    <circle cx="50" cy="50" r="40" stroke="#d4a03a" stroke-width="0.5" opacity="0.12"/>
    <circle cx="50" cy="4" r="3" fill="#d4a03a" opacity="0.7"/>
    <line x1="50" y1="14" x2="50" y2="4" stroke="#d4a03a" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <style>@keyframes lumen-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18);opacity:1}}</style>
    <circle cx="50" cy="50" r="34" fill="none" stroke="#d4a03a" stroke-width="0.5" opacity="0.15" style="transform-origin:50px 50px;animation:lumen-pulse 3s ease-in-out infinite"/>
    <circle cx="50" cy="50" r="22" fill="none" stroke="#d4a03a" stroke-width="0.8" opacity="0.25" style="transform-origin:50px 50px;animation:lumen-pulse 3s ease-in-out 0.3s infinite"/>
    <circle cx="50" cy="50" r="12" fill="#d4a03a" opacity="0.9" style="transform-origin:50px 50px;animation:lumen-pulse 3s ease-in-out 0.6s infinite"/>
  </svg>
</div>
<script>
  // Hide splash once React mounts into #root
  (function() {
    var observer = new MutationObserver(function(mutations) {
      var root = document.getElementById('root');
      if (root && root.children.length > 0) {
        var splash = document.getElementById('lumen-splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(function() { splash.remove(); }, 400);
        }
        observer.disconnect();
      }
    });
    var root = document.getElementById('root');
    if (root) observer.observe(root, { childList: true });
    // Fallback: remove after 5s no matter what
    setTimeout(function() {
      var s = document.getElementById('lumen-splash');
      if (s) { s.style.opacity = '0'; setTimeout(function() { s.remove(); }, 400); }
    }, 5000);
  })();
</script>

  </body>
</html>
